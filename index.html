<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NMIS Fund Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a1628}</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    const NAVY       = "#0a1628";
    const NAVY_MID   = "#132240";
    const NAVY_LIGHT = "#1a2d50";
    const GOLD       = "#c9a84c";
    const GOLD_LIGHT = "#e8d48b";
    const GOLD_DIM   = "rgba(201,168,76,0.15)";
    const WHITE      = "#f0ece4";
    const GRAY       = "#8a9bb5";
    const GREEN      = "#3ecf8e";
    const RED        = "#ef4444";

    const funds = {
      taxable: {
        conservative: [
          { ticker:"AUNAX", name:"AB Municipal Bond Inflation Strategy A",   cat:"Muni National Short",     er:0.75, r1y:4.68,  rk1:11, r3y:3.93,  rk3:13,   r5y:2.68,  rk5:3,    score:89.0, consistency:4.5,  rationale:"Top quartile 5Y rank with inflation protection. Tax exempt income ideal for high bracket taxable accounts. Low duration mitigates rate risk." },
          { ticker:"EXMAX", name:"Eaton Vance Short Duration Muni Opps A",   cat:"Muni National Short",     er:0.67, r1y:4.81,  rk1:10, r3y:4.34,  rk3:2,    r5y:1.86,  rk5:26,   score:84.7, consistency:9.9,  rationale:"Exceptional 3Y category rank (top 2%). Short duration provides capital preservation. Low expense ratio enhances after tax yield." },
          { ticker:"PFIAX", name:"PIMCO Low Duration Income A",               cat:"Nontraditional Bond",     er:0.93, r1y:9.37,  rk1:1,  r3y:7.77,  rk3:3,    r5y:3.98,  rk5:4,    score:92.8, consistency:1.2,  rationale:"Number 1 ranked fund in category over 1Y. Exceptional consistency across all periods (1.2 rank std dev). PIMCO's institutional fixed income expertise." },
          { ticker:"LGRAX", name:"Lord Abbett Inv Grade Floating Rate A",    cat:"Floating Rate",           er:0.57, r1y:5.83,  rk1:5,  r3y:null,  rk3:null, r5y:null,  rk5:null, score:98.0, consistency:null, rationale:"Lowest expense ratio in category. Floating rate structure provides natural rate hedge. Investment grade credit quality limits downside." },
        ],
        moderate: [
          { ticker:"AIVSX", name:"American Funds Invmt Co of Amer A",        cat:"Large Blend",             er:0.56, r1y:20.50, rk1:9,  r3y:24.61, rk3:9,    r5y:15.37, rk5:8,    score:90.8, consistency:0.5,  rationale:"Best in class consistency (0.5 rank std dev). Lowest ER in large cap tier. Top decile across ALL timeframes. Capital Group's research depth." },
          { ticker:"ABALX", name:"American Funds American Balanced A",       cat:"Moderate Allocation",     er:0.56, r1y:18.47, rk1:4,  r3y:15.79, rk3:12,   r5y:9.57,  rk5:5,    score:92.2, consistency:3.4,  rationale:"60/40 structure with top quintile performance. 0.56% ER is category leading. Built in rebalancing reduces transaction costs in taxable." },
          { ticker:"BRXAX", name:"MFS Blended Research Intl Equity A",       cat:"Foreign Large Blend",     er:0.77, r1y:39.58, rk1:5,  r3y:21.12, rk3:3,    r5y:11.69, rk5:4,    score:93.4, consistency:0.8,  rationale:"Quant/fundamental blend reduces manager risk. Sub 1.0 rank consistency across periods. International diversification for tax loss harvesting optionality." },
          { ticker:"AMHIX", name:"American High Income Muni Bond A",         cat:"High Yield Muni",         er:0.66, r1y:4.31,  rk1:15, r3y:6.14,  rk3:6,    r5y:2.15,  rk5:10,   score:88.6, consistency:3.7,  rationale:"Tax exempt high yield provides superior after tax income. American Funds platform with 0.66% ER. Pairs well with equity holdings for diversification." },
        ],
        aggressive: [
          { ticker:"FDTTX", name:"Fidelity Advisor Capital Development A",   cat:"Large Growth",            er:0.82, r1y:27.12, rk1:3,  r3y:25.83, rk3:4,    r5y:17.98, rk5:2,    score:93.8, consistency:0.8,  rationale:"Top 4% across ALL periods. Sub 1.0 consistency score signals persistent alpha generation. Fidelity's research platform and sector rotation capability." },
          { ticker:"FELAX", name:"Fidelity Advisor Semiconductors A",        cat:"Technology",              er:0.94, r1y:44.87, rk1:5,  r3y:53.85, rk3:2,    r5y:30.09, rk5:2,    score:92.8, consistency:1.4,  rationale:"30%+ annualized 5Y return with top 2% rank. Secular AI/chip growth thesis. Higher concentration risk but exceptional return per unit of expense." },
          { ticker:"VVOAX", name:"Invesco Value Opportunities A",            cat:"Mid Cap Value",           er:1.02, r1y:20.15, rk1:4,  r3y:21.64, rk3:2,    r5y:19.86, rk5:1,    score:92.7, consistency:1.2,  rationale:"NUMBER 1 ranked fund in category over 5 years. Nearly 20% annualized over 5Y in mid cap value. Provides style diversification vs growth heavy portfolios." },
          { ticker:"TSMEX", name:"Nuveen Quant Small/Mid Cap Eq A",          cat:"Small Blend",             er:0.82, r1y:15.74, rk1:7,  r3y:18.09, rk3:3,    r5y:12.54, rk5:4,    score:92.4, consistency:1.7,  rationale:"Quantitative approach reduces behavioral bias. Top 7% consistency across all periods. 0.82% ER is competitive for active small cap. Size factor exposure." },
        ],
      },
      roth: {
        conservative: [
          { ticker:"BERGX", name:"Carillon Chartwell Real Income A",         cat:"Multisector Bond",        er:0.82, r1y:12.85, rk1:2,  r3y:9.08,  rk3:0,    r5y:4.49,  rk5:0,    score:96.3, consistency:0.9,  rationale:"Near perfect category rankings. 12.85% 1Y return in fixed income is exceptional. Real income focus provides inflation hedge inside tax free wrapper." },
          { ticker:"IPBAX", name:"Allspring Real Return A",                  cat:"Inflation Protected Bond", er:0.77, r1y:10.90, rk1:6,  r3y:8.10,  rk3:2,    r5y:4.11,  rk5:3,    score:93.9, consistency:1.7,  rationale:"Top 6% across all periods. TIPS based strategy better in Roth since inflation adjustments are taxable in brokerage. 0.77% ER." },
          { ticker:"FAHDX", name:"Fidelity Advisor Capital & Income A",      cat:"High Yield Bond",         er:1.18, r1y:11.78, rk1:2,  r3y:11.42, rk3:3,    r5y:6.63,  rk5:2,    score:90.9, consistency:0.5,  rationale:"Best consistency score in the entire analysis (0.5). High yield income compounds tax free in Roth. Top 3% across all timeframes." },
          { ticker:"PFIAX", name:"PIMCO Low Duration Income A",               cat:"Nontraditional Bond",     er:0.93, r1y:9.37,  rk1:1,  r3y:7.77,  rk3:3,    r5y:3.98,  rk5:4,    score:92.8, consistency:1.2,  rationale:"Category leader. Income distributions sheltered from tax in Roth. Short duration limits NAV volatility for near term Roth conversion planning." },
        ],
        moderate: [
          { ticker:"GWPAX", name:"American Funds Growth Portfolio A",        cat:"Aggressive Allocation",   er:0.71, r1y:20.48, rk1:2,  r3y:23.09, rk3:2,    r5y:10.09, rk5:13,   score:91.5, consistency:4.9,  rationale:"Top 2% in 1Y and 3Y. Growth allocation maximizes long term compounding inside Roth. Capital Group's multi manager structure reduces key person risk." },
          { ticker:"FGTAX", name:"Fidelity Advisor Mega Cap Stock A",        cat:"Large Blend",             er:0.86, r1y:26.53, rk1:3,  r3y:26.10, rk3:4,    r5y:18.04, rk5:2,    score:93.5, consistency:0.8,  rationale:"18% annualized 5Y with top 2% rank. Mega cap focus provides liquidity and lower vol. Capital gains sheltered from tax in Roth." },
          { ticker:"JFEAX", name:"JPMorgan Dev International Value A",       cat:"Foreign Large Value",     er:1.00, r1y:48.00, rk1:6,  r3y:24.41, rk3:2,    r5y:16.14, rk5:2,    score:92.0, consistency:1.9,  rationale:"48% 1Y return with top 2% 3Y and 5Y ranks. International dividends and gains fully sheltered in Roth. JPMorgan's global research platform." },
          { ticker:"AIVSX", name:"American Funds Invmt Co of Amer A",        cat:"Large Blend",             er:0.56, r1y:20.50, rk1:9,  r3y:24.61, rk3:9,    r5y:15.37, rk5:8,    score:90.8, consistency:0.5,  rationale:"Unmatched consistency (0.5). 0.56% ER maximizes compound growth over decades. Core holding for any long duration Roth portfolio." },
        ],
        aggressive: [
          { ticker:"FELAX", name:"Fidelity Advisor Semiconductors A",        cat:"Technology",              er:0.94, r1y:44.87, rk1:5,  r3y:53.85, rk3:2,    r5y:30.09, rk5:2,    score:92.8, consistency:1.4,  rationale:"30%+ annualized compounds tax free. Massive capital gains fully sheltered in Roth. Secular AI/semiconductor thesis has long runway." },
          { ticker:"FDTTX", name:"Fidelity Advisor Capital Development A",   cat:"Large Growth",            er:0.82, r1y:27.12, rk1:3,  r3y:25.83, rk3:4,    r5y:17.98, rk5:2,    score:93.8, consistency:0.8,  rationale:"Highest composite score in equity. Growth compounding tax free over 30+ year Roth horizon. Persistent top quartile alpha." },
          { ticker:"VVOAX", name:"Invesco Value Opportunities A",            cat:"Mid Cap Value",           er:1.02, r1y:20.15, rk1:4,  r3y:21.64, rk3:2,    r5y:19.86, rk5:1,    score:92.7, consistency:1.2,  rationale:"#1 in category 5Y. Mid cap value distributions (higher dividend yield) sheltered in Roth. Style diversification from growth tilted core." },
          { ticker:"FHKAX", name:"Fidelity Advisor China Region A",          cat:"China Region",            er:1.17, r1y:42.21, rk1:6,  r3y:20.20, rk3:4,    r5y:2.61,  rk5:11,   score:86.0, consistency:2.9,  rationale:"High volatility EM play better suited for Roth's long horizon. 42% 1Y return shows recovery potential. Tax inefficient distributions sheltered." },
          { ticker:"TSMEX", name:"Nuveen Quant Small/Mid Cap Eq A",          cat:"Small Blend",             er:0.82, r1y:15.74, rk1:7,  r3y:18.09, rk3:3,    r5y:12.54, rk5:4,    score:92.4, consistency:1.7,  rationale:"Small cap premium harvested tax free. Quantitative discipline reduces drawdown risk. 0.82% ER is efficient for active SMID." },
        ],
      },
    };

    const ScoreBadge = ({ score }) => {
      const color = score >= 92 ? GREEN : score >= 85 ? GOLD : score >= 75 ? GRAY : RED;
      return (
        <span style={{ background:`${color}22`, color, padding:"2px 10px", borderRadius:4, fontWeight:700, fontSize:13, fontFamily:"'DM Mono',monospace" }}>
          {score.toFixed(1)}
        </span>
      );
    };

    const RankPill = ({ rank }) => {
      if (rank === null || rank === undefined) return <span style={{ color:GRAY, fontSize:12 }}>N/A</span>;
      const color = rank <= 5 ? GREEN : rank <= 15 ? GOLD : rank <= 30 ? GRAY : RED;
      return (
        <span style={{ color, fontWeight:600, fontFamily:"'DM Mono',monospace", fontSize:13 }}>
          {rank === 0 ? "Top" : `${rank}`}
        </span>
      );
    };

    const MetricBar = ({ value, max, color }) => (
      <div style={{ width:"100%", height:4, background:"rgba(10,22,40,0.8)", borderRadius:2, overflow:"hidden" }}>
        <div style={{ width:`${Math.min((value/max)*100, 100)}%`, height:"100%", background:color, borderRadius:2, transition:"width 0.6s ease" }} />
      </div>
    );

    const FundCard = ({ fund }) => {
      const [expanded, setExpanded] = useState(false);
      return (
        <div
          onClick={() => setExpanded(!expanded)}
          style={{
            background:NAVY_MID,
            border:`1px solid ${expanded ? GOLD : "rgba(201,168,76,0.12)"}`,
            borderRadius:8,
            padding:"14px 16px",
            marginBottom:8,
            cursor:"pointer",
            transition:"all 0.25s ease",
          }}
        >
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
                <span style={{ color:GOLD, fontWeight:700, fontFamily:"'DM Mono',monospace", fontSize:14, letterSpacing:0.5 }}>{fund.ticker}</span>
                <ScoreBadge score={fund.score} />
              </div>
              <div style={{ color:WHITE, fontSize:13, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{fund.name}</div>
              <div style={{ color:GRAY, fontSize:11, marginTop:2 }}>{fund.cat} | ER: {fund.er}%</div>
            </div>
            <div style={{ display:"flex", gap:16, flexShrink:0 }}>
              {[
                { label:"1Y", val:fund.r1y, rank:fund.rk1 },
                { label:"3Y", val:fund.r3y, rank:fund.rk3 },
                { label:"5Y", val:fund.r5y, rank:fund.rk5 },
              ].map((p) => (
                <div key={p.label} style={{ textAlign:"center", minWidth:48 }}>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:2 }}>{p.label}</div>
                  <div style={{ color:WHITE, fontSize:13, fontWeight:600, fontFamily:"'DM Mono',monospace" }}>
                    {p.val !== null ? `${p.val.toFixed(1)}%` : "—"}
                  </div>
                  <div style={{ fontSize:10, marginTop:1 }}>R<RankPill rank={p.rank} /></div>
                </div>
              ))}
            </div>
          </div>

          {expanded && (
            <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid rgba(201,168,76,0.1)` }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:12 }}>
                <div>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:4 }}>EXPENSE RATIO</div>
                  <div style={{ color:fund.er<=0.75?GREEN:fund.er<=1.0?GOLD:RED, fontSize:16, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>{fund.er}%</div>
                  <MetricBar value={2-fund.er} max={2} color={fund.er<=0.75?GREEN:fund.er<=1.0?GOLD:RED} />
                </div>
                <div>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:4 }}>COMPOSITE SCORE</div>
                  <div style={{ color:fund.score>=92?GREEN:GOLD, fontSize:16, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>{fund.score.toFixed(1)}</div>
                  <MetricBar value={fund.score} max={100} color={fund.score>=92?GREEN:GOLD} />
                </div>
                <div>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:4 }}>RANK CONSISTENCY</div>
                  <div style={{ color:fund.consistency!==null?(fund.consistency<=2?GREEN:fund.consistency<=5?GOLD:RED):GRAY, fontSize:16, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>
                    {fund.consistency !== null ? fund.consistency.toFixed(1) : "N/A"}
                  </div>
                  {fund.consistency !== null && <MetricBar value={20-fund.consistency} max={20} color={fund.consistency<=2?GREEN:fund.consistency<=5?GOLD:RED} />}
                </div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                <div>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:4 }}>RETURN/EXPENSE (3Y)</div>
                  <div style={{ color:WHITE, fontSize:14, fontWeight:600, fontFamily:"'DM Mono',monospace" }}>
                    {fund.r3y !== null ? (fund.r3y/fund.er).toFixed(1)+"x" : "—"}
                  </div>
                </div>
                <div>
                  <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1, marginBottom:4 }}>RETURN/EXPENSE (5Y)</div>
                  <div style={{ color:WHITE, fontSize:14, fontWeight:600, fontFamily:"'DM Mono',monospace" }}>
                    {fund.r5y !== null ? (fund.r5y/fund.er).toFixed(1)+"x" : "—"}
                  </div>
                </div>
              </div>

              <div style={{ background:GOLD_DIM, borderRadius:6, padding:12, borderLeft:`3px solid ${GOLD}` }}>
                <div style={{ color:GOLD, fontSize:10, fontWeight:700, letterSpacing:1, marginBottom:4 }}>SUITABILITY RATIONALE</div>
                <div style={{ color:WHITE, fontSize:12, lineHeight:1.5 }}>{fund.rationale}</div>
              </div>
            </div>
          )}
        </div>
      );
    };

    function NMISAnalysis() {
      const [accountType,      setAccountType]      = useState("taxable");
      const [riskLevel,        setRiskLevel]         = useState("moderate");
      const [showMethodology,  setShowMethodology]   = useState(false);

      const currentFunds = funds[accountType]?.[riskLevel] || [];

      const contextNote = accountType === "taxable"
        ? riskLevel === "conservative"
          ? "Taxable conservative: Prioritizing municipal bonds for tax exempt income, floating rate for rate protection, and low duration strategies for capital preservation."
          : riskLevel === "moderate"
          ? "Taxable moderate: Balancing tax efficient equity (low turnover, qualified dividends) with muni fixed income. Emphasis on lowest expense ratios to maximize after tax returns."
          : "Taxable aggressive: Growth oriented equities with strong risk adjusted ranks. Consider tax loss harvesting pairs across international and sector funds."
        : riskLevel === "conservative"
        ? "Roth conservative: Placing tax inefficient fixed income (TIPS, high yield, multisector) inside Roth to shelter ordinary income distributions from taxation."
        : riskLevel === "moderate"
        ? "Roth moderate: Core equity holdings where capital gains compound tax free over decades. International funds shelter foreign dividend withholding complexity."
        : "Roth aggressive: Maximum growth compounding inside tax free wrapper. Sector concentration and EM volatility acceptable given Roth's permanent tax shelter and long horizon.";

      return (
        <div style={{ background:NAVY, minHeight:"100vh", color:WHITE, fontFamily:"'Inter','SF Pro',-apple-system,sans-serif" }}>

          {/* Header */}
          <div style={{ padding:"24px 20px 16px", borderBottom:`1px solid rgba(201,168,76,0.15)` }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
              <div style={{ width:8, height:8, background:GOLD, borderRadius:"50%" }} />
              <span style={{ color:GOLD, fontSize:11, fontWeight:600, letterSpacing:2, textTransform:"uppercase" }}>NMIS Brokerage Research List</span>
            </div>
            <h1 style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, fontWeight:400, color:WHITE, margin:"4px 0", lineHeight:1.2 }}>
              Risk Adjusted Fund Analysis
            </h1>
            <div style={{ color:GRAY, fontSize:11 }}>Data as of December 31, 2025 | 1,944 funds screened</div>
          </div>

          {/* Account Type Toggle */}
          <div style={{ padding:"16px 20px 0" }}>
            <div style={{ display:"flex", gap:8, marginBottom:12 }}>
              {[{ key:"taxable", label:"Taxable Brokerage" }, { key:"roth", label:"Roth IRA" }].map((t) => (
                <button
                  key={t.key}
                  onClick={() => setAccountType(t.key)}
                  style={{
                    flex:1, padding:"10px 12px",
                    background: accountType===t.key ? GOLD : "transparent",
                    color:       accountType===t.key ? NAVY : GRAY,
                    border:`1px solid ${accountType===t.key ? GOLD : "rgba(201,168,76,0.2)"}`,
                    borderRadius:6, fontWeight:700, fontSize:13, cursor:"pointer", transition:"all 0.2s", letterSpacing:0.3,
                  }}
                >{t.label}</button>
              ))}
            </div>

            {/* Risk Tolerance Toggle */}
            <div style={{ display:"flex", gap:6 }}>
              {[
                { key:"conservative", label:"Conservative", icon:"◆" },
                { key:"moderate",     label:"Moderate",     icon:"◆◆" },
                { key:"aggressive",   label:"Aggressive",   icon:"◆◆◆" },
              ].map((r) => (
                <button
                  key={r.key}
                  onClick={() => setRiskLevel(r.key)}
                  style={{
                    flex:1, padding:"8px 8px",
                    background: riskLevel===r.key ? NAVY_LIGHT : "transparent",
                    color:       riskLevel===r.key ? GOLD : GRAY,
                    border:`1px solid ${riskLevel===r.key ? "rgba(201,168,76,0.3)" : "rgba(201,168,76,0.08)"}`,
                    borderRadius:6, fontSize:11, fontWeight:600, cursor:"pointer", transition:"all 0.2s",
                  }}
                >
                  <div style={{ fontSize:8, marginBottom:2, letterSpacing:2 }}>{r.icon}</div>
                  {r.label}
                </button>
              ))}
            </div>
          </div>

          {/* Context Note */}
          <div style={{ padding:"12px 20px" }}>
            <div style={{ background:GOLD_DIM, borderRadius:6, padding:10, borderLeft:`3px solid ${GOLD}` }}>
              <div style={{ color:GOLD_LIGHT, fontSize:11, lineHeight:1.5 }}>{contextNote}</div>
            </div>
          </div>

          {/* Fund Cards */}
          <div style={{ padding:"0 20px 12px" }}>
            <div style={{ color:GRAY, fontSize:10, fontWeight:600, letterSpacing:1.5, marginBottom:8, textTransform:"uppercase" }}>
              Recommended Funds ({currentFunds.length}) — Tap to expand
            </div>
            {currentFunds.map((f) => <FundCard key={f.ticker} fund={f} />)}
          </div>

          {/* Methodology */}
          <div style={{ padding:"0 20px 32px" }}>
            <button
              onClick={() => setShowMethodology(!showMethodology)}
              style={{
                width:"100%", background:"transparent",
                border:`1px solid rgba(201,168,76,0.15)`,
                borderRadius: showMethodology ? "6px 6px 0 0" : 6,
                padding:"12px 16px", color:GOLD, fontSize:12, fontWeight:600, cursor:"pointer",
                display:"flex", justifyContent:"space-between", alignItems:"center", letterSpacing:0.5,
              }}
            >
              <span>Scoring Methodology &amp; Risk Metrics</span>
              <span style={{ transform:showMethodology?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s" }}>▼</span>
            </button>

            {showMethodology && (
              <div style={{ background:NAVY_MID, borderRadius:"0 0 6px 6px", padding:16, border:`1px solid rgba(201,168,76,0.15)`, borderTop:"none" }}>
                {[
                  {
                    title:"COMPOSITE SCORE (0 to 100)",
                    body:"Weighted category percentile rank inversion: 5Y rank (40% weight) + 3Y rank (35%) + 1Y rank (25%). Ranks inverted so higher = better. Expense ratio penalty applied: each 50bps above 0.50% deducts 5 points. Funds with incomplete track records scored on available periods with weight redistribution.",
                  },
                  {
                    title:"RANK CONSISTENCY (Standard Deviation)",
                    body:"Standard deviation of category percentile ranks across 1Y, 3Y, and 5Y periods. Lower = more consistent alpha generation. Scores below 2.0 indicate persistent outperformance. Scores above 10.0 suggest regime dependent or style timing risk.",
                  },
                  {
                    title:"RETURN / EXPENSE RATIO",
                    body:"Annualized return divided by prospectus net expense ratio. Measures return generated per unit of cost. Higher ratios indicate more efficient alpha extraction. A 3Y ratio above 20x is considered excellent.",
                  },
                  {
                    title:"CATEGORY PERCENTILE RANK",
                    body:"Morningstar category percentile rank where 1 = top of category and 100 = bottom. Green (top 5%), Gold (top 15%), Gray (top 30%), Red (below 30th percentile). Evaluated across 1Y, 3Y annualized, and 5Y annualized periods.",
                  },
                ].map((s) => (
                  <div key={s.title} style={{ marginBottom:16 }}>
                    <div style={{ color:GOLD, fontSize:12, fontWeight:700, letterSpacing:1, marginBottom:8 }}>{s.title}</div>
                    <div style={{ color:WHITE, fontSize:12, lineHeight:1.6 }}>{s.body}</div>
                  </div>
                ))}

                <div style={{ borderTop:`1px solid rgba(201,168,76,0.1)`, paddingTop:12, marginTop:4 }}>
                  <div style={{ color:GOLD, fontSize:12, fontWeight:700, letterSpacing:1, marginBottom:8 }}>ADDITIONAL METRICS TO PULL</div>
                  <div style={{ color:GRAY, fontSize:11, lineHeight:1.7 }}>
                    For full due diligence via Morningstar Direct or Bloomberg: Sharpe Ratio (3Y, 5Y) | Sortino Ratio |
                    Information Ratio vs benchmark | Alpha and Beta vs category index | Maximum Drawdown (trailing 5Y) |
                    Upside/Downside Capture Ratios | Treynor Ratio | Standard Deviation (annualized) |
                    R Squared vs benchmark | Tracking Error | Tax Cost Ratio (for taxable recs)
                  </div>
                </div>

                <div style={{ borderTop:`1px solid rgba(201,168,76,0.1)`, paddingTop:12, marginTop:12 }}>
                  <div style={{ color:GOLD, fontSize:12, fontWeight:700, letterSpacing:1, marginBottom:8 }}>A SHARES VS C SHARES NOTE</div>
                  <div style={{ color:GRAY, fontSize:11, lineHeight:1.7 }}>
                    Analysis focuses on A shares for longer holding periods where the front load amortizes and lower ongoing ER compounds favorably vs C shares.
                    At breakpoint levels ($100K+), effective load drops significantly. For positions under $25K with sub 3 year horizon, C shares may be more appropriate.
                    All recommendations shown as A shares; C share equivalents available in underlying data.
                  </div>
                </div>
              </div>
            )}
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<NMISAnalysis />);
  </script>
